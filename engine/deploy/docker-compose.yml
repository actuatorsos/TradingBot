version: "3.8"

services:
  apex-engine:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: apex-trader-engine
    restart: unless-stopped
    ports:
      - "${APEX_API_PORT:-8080}:8080"
    env_file:
      - ../.env
    volumes:
      - ../logs:/app/logs
      - ../settings.json:/app/settings.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
